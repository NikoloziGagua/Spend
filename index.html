<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Ledger" />
<meta name="theme-color" content="#0e0e0c" />
<link rel="manifest" href='data:application/manifest+json,{"name":"Ledger","short_name":"Ledger","start_url":"./","display":"standalone","background_color":"#0e0e0c","theme_color":"#0e0e0c","icons":[{"src":"data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 192 192%22><rect width=%22192%22 height=%22192%22 fill=%22%230e0e0c%22/><text x=%2296%22 y=%22130%22 font-family=%22monospace%22 font-size=%22120%22 font-weight=%22700%22 text-anchor=%22middle%22 fill=%22%23d4ff4d%22>$</text></svg>","sizes":"192x192","type":"image/svg+xml"}]}' />
<title>Ledger</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #0e0e0c;
    --bg-soft: #161613;
    --paper: #f4f1e8;
    --paper-soft: #e8e3d4;
    --ink: #1a1a16;
    --ink-soft: #5a5a52;
    --ink-faint: #9c9a8c;
    --accent: #d4ff4d;
    --accent-dim: #8aa632;
    --danger: #ff6b3d;
    --ok: #7ed957;
    --line: #2a2a25;
    --line-paper: #d4d0c2;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { background: var(--bg); color: var(--paper); }
  body {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 400;
    min-height: 100vh;
    min-height: 100dvh;
    padding: max(env(safe-area-inset-top), 20px) 0 max(env(safe-area-inset-bottom), 100px);
    max-width: 560px;
    margin: 0 auto;
    overflow-x: hidden;
    position: relative;
  }

  /* Scanline / CRT vibe overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: repeating-linear-gradient(
      0deg,
      rgba(255,255,255,0) 0px,
      rgba(255,255,255,0) 2px,
      rgba(255,255,255,.012) 3px,
      rgba(255,255,255,0) 4px
    );
    z-index: 200;
    mix-blend-mode: overlay;
  }
  /* Grain */
  body::before {
    content: '';
    position: fixed; inset: 0;
    pointer-events: none; opacity: .08; z-index: 100;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }

  /* ============ HEADER ============ */
  header {
    padding: 20px 22px 24px;
    border-bottom: 1px dashed var(--line);
    position: relative;
    animation: fadeIn .6s ease;
  }
  .header-meta {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: var(--ink-faint);
    text-transform: uppercase;
    letter-spacing: .15em;
    margin-bottom: 16px;
  }
  .header-meta .blink::after {
    content: '●';
    color: var(--accent);
    margin-left: 6px;
    animation: blink 1.6s ease-in-out infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: .3; }
  }
  h1 {
    font-family: 'Instrument Serif', serif;
    font-weight: 400;
    font-style: italic;
    font-size: 38px;
    line-height: 1;
    color: var(--paper);
    letter-spacing: -.01em;
  }
  h1 .amp {
    color: var(--accent);
    font-style: normal;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 300;
    font-size: 26px;
    margin: 0 2px;
    vertical-align: 1px;
  }

  /* ============ TABS ============ */
  nav.tabs {
    display: flex;
    border-bottom: 1px dashed var(--line);
    background: var(--bg);
    position: sticky;
    top: 0;
    z-index: 30;
  }
  .tab {
    flex: 1;
    background: none;
    border: none;
    border-right: 1px dashed var(--line);
    color: var(--ink-faint);
    padding: 14px 8px;
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: .18em;
    text-transform: uppercase;
    transition: all .3s ease;
    position: relative;
  }
  .tab:last-child { border-right: none; }
  .tab.active { color: var(--accent); background: var(--bg-soft); }
  .tab.active::before {
    content: '> ';
    color: var(--accent);
  }

  .view { animation: fadeIn .35s ease both; padding: 24px 22px 0; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

  /* ============ TODAY VIEW - RECEIPT ============ */
  .receipt {
    background: var(--paper);
    color: var(--ink);
    padding: 24px 22px;
    border-radius: 2px;
    position: relative;
    margin-bottom: 24px;
    box-shadow:
      0 1px 0 var(--paper-soft),
      0 20px 40px -20px rgba(0,0,0,.5);
    animation: receiptPrint .8s cubic-bezier(.2,.7,.2,1);
    transform-origin: top center;
  }
  @keyframes receiptPrint {
    0% { transform: scaleY(.3); opacity: 0; }
    60% { transform: scaleY(1.02); opacity: 1; }
    100% { transform: scaleY(1); }
  }
  /* Torn edge top + bottom */
  .receipt::before, .receipt::after {
    content: '';
    position: absolute;
    left: 0; right: 0;
    height: 8px;
    background-image:
      linear-gradient(45deg, transparent 33.333%, var(--paper) 33.333%, var(--paper) 66.667%, transparent 66.667%),
      linear-gradient(-45deg, transparent 33.333%, var(--paper) 33.333%, var(--paper) 66.667%, transparent 66.667%);
    background-size: 14px 8px;
    background-position: 0 0, 0 0;
  }
  .receipt::before { top: -7px; }
  .receipt::after { bottom: -7px; transform: scaleY(-1); }

  .receipt-header {
    text-align: center;
    padding-bottom: 16px;
    border-bottom: 1px dashed var(--line-paper);
    margin-bottom: 16px;
  }
  .receipt-title {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-size: 22px;
    margin-bottom: 4px;
  }
  .receipt-date {
    font-size: 10px;
    color: var(--ink-soft);
    letter-spacing: .12em;
    text-transform: uppercase;
  }
  .receipt-num {
    font-size: 9px;
    color: var(--ink-faint);
    margin-top: 4px;
    letter-spacing: .1em;
  }

  .receipt-total-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 8px 0;
    font-size: 12px;
    color: var(--ink-soft);
    letter-spacing: .08em;
  }
  .receipt-total-row.grand {
    border-top: 1px dashed var(--line-paper);
    margin-top: 12px;
    padding-top: 14px;
    font-size: 14px;
    color: var(--ink);
    font-weight: 500;
  }
  .receipt-total-row .amount {
    font-variant-numeric: tabular-nums;
    font-weight: 500;
  }
  .receipt-total-row.grand .amount {
    font-size: 28px;
    font-weight: 700;
  }

  .receipt-items {
    padding: 4px 0 12px;
  }
  .receipt-item {
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 12px;
    align-items: baseline;
    padding: 6px 0;
    font-size: 13px;
    animation: itemPrint .4s cubic-bezier(.2,.7,.2,1) both;
    position: relative;
  }
  @keyframes itemPrint {
    from { opacity: 0; transform: translateX(-6px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  .receipt-item.removing { animation: itemRemove .35s ease forwards; }
  @keyframes itemRemove {
    to { opacity: 0; transform: translateX(20px); height: 0; padding: 0; }
  }
  .item-desc {
    color: var(--ink);
    word-break: break-word;
  }
  .item-cat {
    font-size: 9px;
    color: var(--ink-faint);
    text-transform: uppercase;
    letter-spacing: .1em;
    background: var(--paper-soft);
    padding: 2px 6px;
    border-radius: 2px;
  }
  .item-amt {
    font-variant-numeric: tabular-nums;
    color: var(--ink);
    font-weight: 500;
  }
  .item-delete {
    grid-column: 1 / -1;
    background: none;
    border: none;
    color: var(--danger);
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: .12em;
    cursor: pointer;
    padding: 4px 0 0;
    text-align: right;
    opacity: 0;
    max-height: 0;
    overflow: hidden;
    transition: opacity .25s ease, max-height .25s ease;
    font-family: inherit;
  }
  .receipt-item.show-delete .item-delete {
    opacity: 1;
    max-height: 30px;
  }

  .receipt-empty {
    text-align: center;
    padding: 24px 0;
    color: var(--ink-faint);
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-size: 15px;
  }

  /* ============ ADD FORM ============ */
  .add-form {
    background: var(--bg-soft);
    border: 1px dashed var(--line);
    padding: 18px 18px 14px;
    margin-bottom: 24px;
    border-radius: 2px;
  }
  .form-label {
    display: block;
    font-size: 9px;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 6px;
  }
  .form-row {
    display: flex;
    gap: 12px;
    margin-bottom: 14px;
  }
  .form-field { flex: 1; }
  .form-field.amount-field { flex: 0 0 130px; }
  .form-input {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--line);
    color: var(--paper);
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    padding: 6px 0;
    outline: none;
    transition: border-color .25s ease;
  }
  .form-input:focus {
    border-bottom-color: var(--accent);
  }
  .form-input.amount {
    font-size: 22px;
    font-weight: 500;
    color: var(--accent);
  }
  .form-input::placeholder {
    color: var(--ink-faint);
  }

  .cat-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 14px;
  }
  .cat-chip {
    background: transparent;
    border: 1px solid var(--line);
    color: var(--ink-faint);
    padding: 5px 11px;
    border-radius: 2px;
    cursor: pointer;
    font-family: inherit;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: .12em;
    transition: all .2s ease;
  }
  .cat-chip:hover { border-color: var(--accent-dim); color: var(--paper); }
  .cat-chip.active {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--bg);
    font-weight: 500;
  }

  .submit-btn {
    width: 100%;
    background: var(--accent);
    color: var(--bg);
    border: none;
    padding: 12px;
    font-family: inherit;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .2em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    transition: all .2s ease;
    position: relative;
    overflow: hidden;
  }
  .submit-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 12px -2px rgba(212,255,77,.3);
  }
  .submit-btn:active { transform: translateY(0); }
  .submit-btn.flash {
    animation: btnFlash .5s ease;
  }
  @keyframes btnFlash {
    0%, 100% { background: var(--accent); }
    50% { background: var(--paper); }
  }

  /* ============ MONTH TOTALS ============ */
  .totals-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--line);
    border: 1px solid var(--line);
    margin-bottom: 28px;
  }
  .total-cell {
    background: var(--bg);
    padding: 16px 14px;
    animation: fadeIn .5s ease both;
  }
  .total-cell.wide { grid-column: 1 / -1; background: var(--bg-soft); }
  .total-cell:nth-child(2) { animation-delay: .05s; }
  .total-cell:nth-child(3) { animation-delay: .1s; }
  .total-cell:nth-child(4) { animation-delay: .15s; }
  .total-label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: .18em;
    color: var(--ink-faint);
    margin-bottom: 8px;
  }
  .total-value {
    font-size: 28px;
    font-weight: 500;
    font-variant-numeric: tabular-nums;
    color: var(--paper);
    line-height: 1;
  }
  .total-value.accent { color: var(--accent); }
  .total-sub {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-size: 12px;
    color: var(--ink-faint);
    margin-top: 6px;
  }

  /* ============ HISTORY ============ */
  .history-month {
    margin-bottom: 32px;
    animation: fadeIn .5s ease both;
  }
  .history-month-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding-bottom: 10px;
    border-bottom: 1px dashed var(--line);
    margin-bottom: 12px;
  }
  .history-month-title {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-size: 22px;
    color: var(--paper);
  }
  .history-month-total {
    font-variant-numeric: tabular-nums;
    font-size: 18px;
    font-weight: 500;
    color: var(--accent);
  }
  .history-day-row {
    display: grid;
    grid-template-columns: 60px 1fr auto;
    gap: 12px;
    align-items: baseline;
    padding: 8px 0;
    border-bottom: 1px dashed var(--line);
    cursor: pointer;
    transition: padding-left .2s ease;
  }
  .history-day-row:hover { padding-left: 4px; }
  .history-day-row .day-num {
    font-size: 11px;
    color: var(--ink-faint);
    text-transform: uppercase;
    letter-spacing: .1em;
  }
  .history-day-row .day-summary {
    font-size: 12px;
    color: var(--paper);
  }
  .history-day-row .day-summary .preview {
    color: var(--ink-faint);
  }
  .history-day-row .day-total {
    font-variant-numeric: tabular-nums;
    font-weight: 500;
    color: var(--paper);
  }

  /* ============ STATS ============ */
  .stat-block {
    margin-bottom: 28px;
    animation: fadeIn .5s ease both;
  }
  .stat-block-label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: .2em;
    color: var(--ink-faint);
    margin-bottom: 12px;
  }
  .cat-bars { }
  .cat-bar-row {
    margin-bottom: 14px;
  }
  .cat-bar-top {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 5px;
  }
  .cat-name {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .12em;
    color: var(--paper);
  }
  .cat-amt {
    font-variant-numeric: tabular-nums;
    font-size: 13px;
    color: var(--paper);
    font-weight: 500;
  }
  .cat-amt .pct {
    color: var(--ink-faint);
    font-size: 10px;
    margin-left: 6px;
  }
  .cat-bar-track {
    height: 4px;
    background: var(--line);
    overflow: hidden;
    border-radius: 2px;
  }
  .cat-bar-fill {
    height: 100%;
    background: var(--accent);
    width: 0;
    transition: width 1s cubic-bezier(.2,.7,.2,1);
    border-radius: 2px;
  }

  /* Daily chart (last 30 days) */
  .day-chart {
    display: flex;
    align-items: flex-end;
    gap: 2px;
    height: 110px;
    padding: 4px 0;
  }
  .day-chart-bar {
    flex: 1;
    background: var(--line);
    min-height: 2px;
    border-radius: 1px 1px 0 0;
    transition: background .2s ease;
    position: relative;
    animation: barRise .8s cubic-bezier(.2,.7,.2,1) both;
    transform-origin: bottom;
    cursor: pointer;
  }
  @keyframes barRise {
    from { transform: scaleY(0); }
    to { transform: scaleY(1); }
  }
  .day-chart-bar.has-spending { background: var(--accent-dim); }
  .day-chart-bar.has-spending:hover { background: var(--accent); }
  .day-chart-bar.today { background: var(--accent); outline: 1px solid var(--paper); outline-offset: 1px; }
  .day-chart-labels {
    display: flex;
    justify-content: space-between;
    font-size: 9px;
    color: var(--ink-faint);
    text-transform: uppercase;
    letter-spacing: .1em;
    margin-top: 8px;
  }

  /* ============ DAY MODAL ============ */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.65);
    z-index: 50; display: none;
    animation: fadeIn .25s ease;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  .modal-backdrop.open {
    display: flex;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-shell {
    width: 100%;
    max-width: 560px;
    padding: 0 14px 14px;
    animation: modalUp .4s cubic-bezier(.2,.7,.2,1);
    max-height: 88vh;
    overflow-y: auto;
  }
  @keyframes modalUp {
    from { transform: translateY(100%); }
    to   { transform: translateY(0); }
  }
  .modal-close {
    background: var(--bg-soft);
    border: 1px dashed var(--line);
    color: var(--paper);
    width: 100%;
    padding: 12px;
    margin-top: 12px;
    font-family: inherit;
    font-size: 10px;
    letter-spacing: .18em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
  }
  .modal-close:hover { border-color: var(--accent); color: var(--accent); }

  /* Settings / currency */
  .currency-toggle {
    position: absolute;
    top: 22px;
    right: 22px;
    background: var(--bg-soft);
    border: 1px solid var(--line);
    color: var(--ink-faint);
    padding: 5px 10px;
    font-family: inherit;
    font-size: 10px;
    letter-spacing: .15em;
    cursor: pointer;
    border-radius: 2px;
    transition: all .2s ease;
  }
  .currency-toggle:hover { color: var(--accent); border-color: var(--accent-dim); }
</style>

</head>
<body>

<header>
  <div class="header-meta">
    <span id="metaDate"></span>
    <span class="blink">REC</span>
  </div>
  <h1>spent<span class="amp">&</span><i>saved</i></h1>
  <button class="currency-toggle" id="currencyToggle">€ EUR</button>
</header>

<nav class="tabs">
  <button class="tab active" data-view="today">Today</button>
  <button class="tab" data-view="history">History</button>
  <button class="tab" data-view="stats">Stats</button>
</nav>

<!-- TODAY -->

<main id="todayView" class="view">

  <!-- Add form -->

  <div class="add-form">
    <span class="form-label">+ NEW EXPENSE</span>
    <div class="form-row">
      <div class="form-field">
        <input class="form-input" id="descInput" placeholder="what was it..." />
      </div>
      <div class="form-field amount-field">
        <input class="form-input amount" id="amtInput" type="text" inputmode="decimal" placeholder="0.00" />
      </div>
    </div>
    <div class="cat-chips" id="catChips"></div>
    <button class="submit-btn" id="submitBtn">Record →</button>
  </div>

  <!-- Today receipt -->

  <div class="receipt" id="todayReceipt">
    <div class="receipt-header">
      <div class="receipt-title">Today's Receipt</div>
      <div class="receipt-date" id="receiptDate"></div>
      <div class="receipt-num" id="receiptNum"></div>
    </div>
    <div class="receipt-items" id="receiptItems"></div>
    <div class="receipt-total-row">
      <span>Items</span>
      <span class="amount" id="todayCount">0</span>
    </div>
    <div class="receipt-total-row grand">
      <span>TOTAL</span>
      <span class="amount" id="todayTotal">0.00</span>
    </div>
  </div>

  <!-- This month at a glance -->

  <div class="totals-grid">
    <div class="total-cell wide">
      <div class="total-label">This Month</div>
      <div class="total-value accent" id="monthTotal">0.00</div>
      <div class="total-sub" id="monthSub">no entries yet</div>
    </div>
    <div class="total-cell">
      <div class="total-label">Daily Avg</div>
      <div class="total-value" id="monthAvg">0.00</div>
    </div>
    <div class="total-cell">
      <div class="total-label">Entries</div>
      <div class="total-value" id="monthEntries">0</div>
    </div>
  </div>

</main>

<!-- HISTORY -->

<main id="historyView" class="view" style="display:none">
  <div id="historyContent"></div>
</main>

<!-- STATS -->

<main id="statsView" class="view" style="display:none">
  <div class="totals-grid">
    <div class="total-cell">
      <div class="total-label">All-time</div>
      <div class="total-value accent" id="statTotal">0.00</div>
    </div>
    <div class="total-cell">
      <div class="total-label">Entries</div>
      <div class="total-value" id="statCount">0</div>
    </div>
    <div class="total-cell">
      <div class="total-label">Avg / Entry</div>
      <div class="total-value" id="statAvg">0.00</div>
    </div>
    <div class="total-cell">
      <div class="total-label">Biggest Day</div>
      <div class="total-value" id="statBiggest">0.00</div>
    </div>
  </div>

  <div class="stat-block">
    <div class="stat-block-label">Last 30 days</div>
    <div class="day-chart" id="dayChart"></div>
    <div class="day-chart-labels">
      <span id="chartStart">30d ago</span>
      <span>Today</span>
    </div>
  </div>

  <div class="stat-block">
    <div class="stat-block-label">By Category (this month)</div>
    <div class="cat-bars" id="catBars"></div>
  </div>
</main>

<!-- DAY MODAL -->

<div class="modal-backdrop" id="modal">
  <div class="modal-shell">
    <div class="receipt" id="modalReceipt"></div>
    <button class="modal-close" id="modalClose">Close</button>
  </div>
</div>

<script>
const STORAGE_KEY = 'ledger.v1';
const CURR_KEY = 'ledger.currency';

const CATEGORIES = [
  { id: 'food',     label: 'Food' },
  { id: 'groceries',label: 'Groceries' },
  { id: 'transport',label: 'Transport' },
  { id: 'fun',      label: 'Fun' },
  { id: 'home',     label: 'Home' },
  { id: 'health',   label: 'Health' },
  { id: 'shop',     label: 'Shopping' },
  { id: 'bills',    label: 'Bills' },
  { id: 'other',    label: 'Other' },
];

const pad = n => String(n).padStart(2,'0');
const dateKey = (d = new Date()) => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const parseKey = k => { const [y,m,d] = k.split('-').map(Number); return new Date(y, m-1, d); };
const monthKey = (d = new Date()) => `${d.getFullYear()}-${pad(d.getMonth()+1)}`;
const todayKey = () => dateKey();

let store = (() => {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
  catch { return {}; }
})();
const save = () => localStorage.setItem(STORAGE_KEY, JSON.stringify(store));

// Currency
const CURRENCIES = [
  { code: 'EUR', symbol: '€', label: '€ EUR' },
  { code: 'USD', symbol: '$', label: '$ USD' },
  { code: 'GBP', symbol: '£', label: '£ GBP' },
];
let currentCurr = localStorage.getItem(CURR_KEY) || 'EUR';
const getCurr = () => CURRENCIES.find(c => c.code === currentCurr) || CURRENCIES[0];
const fmt = (n) => {
  const v = Number(n) || 0;
  return getCurr().symbol + v.toFixed(2);
};

document.getElementById('currencyToggle').addEventListener('click', () => {
  const i = CURRENCIES.findIndex(c => c.code === currentCurr);
  currentCurr = CURRENCIES[(i + 1) % CURRENCIES.length].code;
  localStorage.setItem(CURR_KEY, currentCurr);
  document.getElementById('currencyToggle').textContent = getCurr().label;
  refreshActiveView();
});
document.getElementById('currencyToggle').textContent = getCurr().label;

// Header date
const setMetaDate = () => {
  const d = new Date();
  const str = d.toLocaleDateString(undefined, { weekday:'short', day:'numeric', month:'short' }).toUpperCase();
  document.getElementById('metaDate').textContent = str;
};

const getDay = (key = todayKey()) => {
  if (!store[key]) store[key] = [];
  return store[key];
};

const dayTotal = (key) => (store[key] || []).reduce((s, e) => s + e.amount, 0);

// Categories UI
const renderCatChips = () => {
  const wrap = document.getElementById('catChips');
  wrap.innerHTML = '';
  CATEGORIES.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'cat-chip' + (i === 0 ? ' active' : '');
    btn.dataset.cat = c.id;
    btn.textContent = c.label;
    btn.addEventListener('click', () => {
      wrap.querySelectorAll('.cat-chip').forEach(x => x.classList.remove('active'));
      btn.classList.add('active');
    });
    wrap.appendChild(btn);
  });
};
renderCatChips();

const selectedCat = () => {
  const el = document.querySelector('.cat-chip.active');
  return el ? el.dataset.cat : 'other';
};
const catLabel = (id) => (CATEGORIES.find(c => c.id === id) || { label: 'Other' }).label;

// Today receipt render
const renderToday = () => {
  const today = todayKey();
  const items = getDay(today);
  const itemsEl = document.getElementById('receiptItems');

  // Date in receipt
  const d = new Date();
  document.getElementById('receiptDate').textContent =
    d.toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' }).toUpperCase();
  document.getElementById('receiptNum').textContent =
    `#${today.replace(/-/g,'')}-${String(items.length).padStart(3,'0')}`;

  itemsEl.innerHTML = '';
  if (items.length === 0) {
    itemsEl.innerHTML = '<div class="receipt-empty">— nothing recorded yet —</div>';
  } else {
    items.forEach((item, i) => {
      const row = document.createElement('div');
      row.className = 'receipt-item';
      row.style.animationDelay = (i * 50) + 'ms';
      const desc = document.createElement('span');
      desc.className = 'item-desc';
      desc.textContent = item.desc || catLabel(item.cat);
      const cat = document.createElement('span');
      cat.className = 'item-cat';
      cat.textContent = catLabel(item.cat);
      const amt = document.createElement('span');
      amt.className = 'item-amt';
      amt.textContent = fmt(item.amount);
      const del = document.createElement('button');
      del.className = 'item-delete';
      del.textContent = 'remove ×';
      row.appendChild(desc); row.appendChild(cat); row.appendChild(amt); row.appendChild(del);

      row.addEventListener('click', (e) => {
        if (e.target === del) return;
        row.classList.toggle('show-delete');
      });
      del.addEventListener('click', (e) => {
        e.stopPropagation();
        row.classList.add('removing');
        setTimeout(() => {
          store[today] = store[today].filter(x => x.id !== item.id);
          if (store[today].length === 0) delete store[today];
          save();
          renderToday();
          renderMonthSummary();
        }, 320);
      });

      itemsEl.appendChild(row);
    });
  }

  // Totals on receipt
  document.getElementById('todayCount').textContent = items.length;
  animateNumber(document.getElementById('todayTotal'), dayTotal(today));
};

// Animate a number (ticker)
const animateNumber = (el, target) => {
  const start = parseFloat((el.textContent || '0').replace(/[^0-9.-]/g, '')) || 0;
  const dur = 500;
  const t0 = performance.now();
  const step = (now) => {
    const t = Math.min(1, (now - t0) / dur);
    const eased = 1 - Math.pow(1 - t, 3);
    const v = start + (target - start) * eased;
    el.textContent = fmt(v);
    if (t < 1) requestAnimationFrame(step);
  };
  requestAnimationFrame(step);
};

// Month summary
const renderMonthSummary = () => {
  const mk = monthKey();
  let total = 0, count = 0, days = new Set();
  Object.keys(store).forEach(k => {
    if (k.startsWith(mk)) {
      store[k].forEach(e => { total += e.amount; count++; });
      if (store[k].length) days.add(k);
    }
  });
  const today = new Date();
  const daysSoFar = today.getDate();
  const avg = daysSoFar > 0 ? total / daysSoFar : 0;

  animateNumber(document.getElementById('monthTotal'), total);
  animateNumber(document.getElementById('monthAvg'), avg);
  document.getElementById('monthEntries').textContent = count;

  const monthName = today.toLocaleDateString(undefined, { month: 'long' });
  document.getElementById('monthSub').textContent =
    count === 0 ? `${monthName} — no entries yet` : `${monthName} — ${days.size} active day${days.size === 1 ? '' : 's'}`;
};

// Submit
const doSubmit = () => {
  const desc = document.getElementById('descInput').value.trim();
  const amtRaw = document.getElementById('amtInput').value.replace(',', '.');
  const amt = parseFloat(amtRaw);
  if (!amt || amt <= 0) {
    document.getElementById('amtInput').focus();
    return;
  }
  const item = {
    id: Date.now() + '-' + Math.random().toString(36).slice(2,7),
    desc,
    cat: selectedCat(),
    amount: amt,
    ts: Date.now(),
  };
  const key = todayKey();
  if (!store[key]) store[key] = [];
  store[key].push(item);
  save();
  document.getElementById('descInput').value = '';
  document.getElementById('amtInput').value = '';
  // Reset to first chip
  document.querySelectorAll('.cat-chip').forEach((c, i) => c.classList.toggle('active', i === 0));

  const btn = document.getElementById('submitBtn');
  btn.classList.add('flash');
  setTimeout(() => btn.classList.remove('flash'), 500);

  renderToday();
  renderMonthSummary();
};
document.getElementById('submitBtn').addEventListener('click', doSubmit);
document.getElementById('amtInput').addEventListener('keydown', e => { if (e.key === 'Enter') doSubmit(); });
document.getElementById('descInput').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('amtInput').focus(); });

// Sanitize amount on input — only digits and one separator
document.getElementById('amtInput').addEventListener('input', e => {
  let v = e.target.value.replace(/[^\d.,]/g, '');
  // collapse multiple separators to one
  const parts = v.split(/[.,]/);
  if (parts.length > 2) v = parts[0] + '.' + parts.slice(1).join('');
  e.target.value = v;
});

// ============ HISTORY ============
const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const renderHistory = () => {
  const container = document.getElementById('historyContent');
  const todayMk = monthKey();

  // Group keys by month
  const byMonth = {};
  Object.keys(store).forEach(k => {
    if (!store[k].length) return;
    const mk = k.slice(0,7);
    if (!byMonth[mk]) byMonth[mk] = [];
    byMonth[mk].push(k);
  });

  const months = Object.keys(byMonth).sort((a,b) => b.localeCompare(a));
  if (!months.length) {
    container.innerHTML = '<div class="receipt-empty" style="color:var(--ink-faint);padding:60px 20px">— nothing in the books yet —</div>';
    return;
  }

  container.innerHTML = '';
  months.forEach((mk, mi) => {
    const [y, m] = mk.split('-').map(Number);
    const days = byMonth[mk].sort((a,b) => b.localeCompare(a));
    const monthTotal = days.reduce((s, k) => s + dayTotal(k), 0);

    const wrap = document.createElement('div');
    wrap.className = 'history-month';
    wrap.style.animationDelay = (mi * 80) + 'ms';
    wrap.innerHTML = `
      <div class="history-month-header">
        <div class="history-month-title">${monthNames[m-1]} <span style="color:var(--ink-faint);font-size:14px">${y}</span></div>
        <div class="history-month-total">${fmt(monthTotal)}</div>
      </div>
    `;

    days.forEach(k => {
      const items = store[k];
      const d = parseKey(k);
      const dayLabel = d.toLocaleDateString(undefined, { weekday: 'short', day: 'numeric' });
      const cats = [...new Set(items.map(i => catLabel(i.cat)))].slice(0,3).join(' · ');

      const row = document.createElement('div');
      row.className = 'history-day-row';
      row.innerHTML = `
        <span class="day-num">${dayLabel}</span>
        <span class="day-summary">${items.length} item${items.length === 1 ? '' : 's'} <span class="preview">· ${cats}</span></span>
        <span class="day-total">${fmt(dayTotal(k))}</span>
      `;
      row.addEventListener('click', () => openDayModal(k));
      wrap.appendChild(row);
    });

    container.appendChild(wrap);
  });
};

// ============ DAY MODAL ============
const openDayModal = (key) => {
  const items = store[key] || [];
  const d = parseKey(key);
  const dateLabel = d.toLocaleDateString(undefined, { weekday:'long', month:'long', day:'numeric', year:'numeric' }).toUpperCase();
  const total = dayTotal(key);

  let itemsHTML = '';
  items.forEach(item => {
    const safeDesc = document.createElement('span'); safeDesc.textContent = item.desc || catLabel(item.cat);
    itemsHTML += `
      <div class="receipt-item" style="animation:none">
        <span class="item-desc">${safeDesc.innerHTML}</span>
        <span class="item-cat">${catLabel(item.cat)}</span>
        <span class="item-amt">${fmt(item.amount)}</span>
      </div>
    `;
  });

  document.getElementById('modalReceipt').innerHTML = `
    <div class="receipt-header">
      <div class="receipt-title">Receipt</div>
      <div class="receipt-date">${dateLabel}</div>
      <div class="receipt-num">#${key.replace(/-/g,'')}-${String(items.length).padStart(3,'0')}</div>
    </div>
    <div class="receipt-items">${itemsHTML || '<div class="receipt-empty">— empty —</div>'}</div>
    <div class="receipt-total-row">
      <span>Items</span>
      <span class="amount">${items.length}</span>
    </div>
    <div class="receipt-total-row grand">
      <span>TOTAL</span>
      <span class="amount">${fmt(total)}</span>
    </div>
  `;

  document.getElementById('modal').classList.add('open');
};
document.getElementById('modalClose').addEventListener('click', () => {
  document.getElementById('modal').classList.remove('open');
});
document.getElementById('modal').addEventListener('click', e => {
  if (e.target.id === 'modal') document.getElementById('modal').classList.remove('open');
});

// ============ STATS ============
const renderStats = () => {
  let totalAll = 0, countAll = 0;
  let biggestDay = 0;
  Object.keys(store).forEach(k => {
    const dt = dayTotal(k);
    totalAll += dt;
    countAll += store[k].length;
    if (dt > biggestDay) biggestDay = dt;
  });
  const avg = countAll ? totalAll / countAll : 0;

  animateNumber(document.getElementById('statTotal'), totalAll);
  document.getElementById('statCount').textContent = countAll;
  animateNumber(document.getElementById('statAvg'), avg);
  animateNumber(document.getElementById('statBiggest'), biggestDay);

  // 30-day chart
  const days = [];
  for (let i = 29; i >= 0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    days.push({ key: dateKey(d), date: d, total: dayTotal(dateKey(d)) });
  }
  const max = Math.max(...days.map(d => d.total), 1);
  const chart = document.getElementById('dayChart');
  chart.innerHTML = '';
  days.forEach((day, i) => {
    const bar = document.createElement('div');
    bar.className = 'day-chart-bar';
    if (day.total > 0) bar.classList.add('has-spending');
    if (day.key === todayKey()) bar.classList.add('today');
    const h = day.total > 0 ? Math.max(4, (day.total / max) * 100) : 2;
    bar.style.height = h + '%';
    bar.style.animationDelay = (i * 20) + 'ms';
    bar.title = `${day.key}: ${fmt(day.total)}`;
    bar.addEventListener('click', () => openDayModal(day.key));
    chart.appendChild(bar);
  });

  // Category breakdown - this month
  const mk = monthKey();
  const catTotals = {};
  Object.keys(store).forEach(k => {
    if (!k.startsWith(mk)) return;
    store[k].forEach(e => {
      catTotals[e.cat] = (catTotals[e.cat] || 0) + e.amount;
    });
  });
  const sorted = Object.entries(catTotals).sort((a,b) => b[1] - a[1]);
  const monthTotal = sorted.reduce((s, [,v]) => s + v, 0);

  const bars = document.getElementById('catBars');
  bars.innerHTML = '';
  if (!sorted.length) {
    bars.innerHTML = '<div style="color:var(--ink-faint);font-style:italic;font-family:Instrument Serif,serif;padding:20px 0;text-align:center">no entries this month</div>';
    return;
  }
  const maxCat = sorted[0][1];
  sorted.forEach(([catId, amt], i) => {
    const pct = monthTotal ? Math.round((amt / monthTotal) * 100) : 0;
    const row = document.createElement('div');
    row.className = 'cat-bar-row';
    row.innerHTML = `
      <div class="cat-bar-top">
        <span class="cat-name">${catLabel(catId)}</span>
        <span class="cat-amt">${fmt(amt)}<span class="pct">${pct}%</span></span>
      </div>
      <div class="cat-bar-track"><div class="cat-bar-fill" style="transition-delay:${i*60}ms"></div></div>
    `;
    bars.appendChild(row);
    // trigger width animation
    requestAnimationFrame(() => {
      row.querySelector('.cat-bar-fill').style.width = ((amt / maxCat) * 100) + '%';
    });
  });
};

// Tabs
let activeView = 'today';
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    activeView = tab.dataset.view;
    ['today','history','stats'].forEach(v => {
      document.getElementById(v + 'View').style.display = (v === activeView) ? '' : 'none';
    });
    refreshActiveView();
  });
});

function refreshActiveView() {
  if (activeView === 'today') { renderToday(); renderMonthSummary(); }
  if (activeView === 'history') renderHistory();
  if (activeView === 'stats') renderStats();
}

setMetaDate();
renderToday();
renderMonthSummary();
</script>

</body>
</html>
